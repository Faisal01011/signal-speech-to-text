services:
  - type: web
    name: signal-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false  # set this manually in the Render dashboard (Supabase connection string)
      - key: WHISPER_MODEL_SIZE
        value: base.en
      - key: WHISPER_DEVICE
        value: cpu
      - key: WHISPER_COMPUTE_TYPE
        value: int8
    healthCheckPath: /health
